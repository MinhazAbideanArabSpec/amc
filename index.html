<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arab Spec IT — File Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
// ── Download logging ──────────────────────────────────────────────────────────
async function logDownload(path) {
  var email = '';
  // Get email from current session (set after OTP verification)
  try {
    var sess = await sb.auth.getSession();
    if (sess.data && sess.data.session && sess.data.session.user) {
      email = sess.data.session.user.email || '';
    }
  } catch(e) {}
  if (!email) return; // no session, skip log
  var fileName = path.split('/').pop();
  await sb.from('downloads').insert({
    email:       email,
    file_path:   path,
    file_name:   fileName,
    downloaded_at: new Date().toISOString()
  });
}

// ── Admin: Download logs ──────────────────────────────────────────────────────
async function openLogs() {
  showModal('<div class="logs-header"><h3 style="margin-bottom:0">&#128203; Download Logs</h3><span class="logs-count" id="logs-count">Loading...</span></div>'
    + '<div class="logs-wrap" id="logs-wrap"><div class="logs-empty">&#8987; Loading logs...</div></div>'
    + '<div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Close</button>'
    + '<button class="btn btn-secondary btn-sm" onclick="exportLogsCsv()">&#8659; Export CSV</button></div>');
  document.getElementById('modal-card').classList.add('modal-wide');
  await refreshLogs();
}

async function refreshLogs() {
  var wrap  = document.getElementById('logs-wrap');
  var count = document.getElementById('logs-count');
  if (!wrap) return;
  var res = await sb.from('downloads').select('*').order('downloaded_at', { ascending: false }).limit(500);
  if (res.error) {
    wrap.innerHTML = '<div class="logs-empty">&#9888;&#65039; Could not load logs: ' + esc(res.error.message) + '</div>';
    return;
  }
  var rows = res.data || [];
  count.textContent = rows.length + ' record' + (rows.length !== 1 ? 's' : '');
  if (rows.length === 0) {
    wrap.innerHTML = '<div class="logs-empty">&#128203; No downloads recorded yet.</div>';
    return;
  }
  wrap.innerHTML = '<table class="logs-table">'
    + '<thead><tr><th>#</th><th>Email</th><th>File</th><th>Date &amp; Time</th></tr></thead>'
    + '<tbody>'
    + rows.map(function(r, i) {
        var dt = new Date(r.downloaded_at);
        var dateStr = dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        var timeStr = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        return '<tr>'
          + '<td style="color:var(--dim);font-size:12px">' + (i + 1) + '</td>'
          + '<td><span class="log-email">' + esc(r.email) + '</span></td>'
          + '<td><span class="log-file" title="' + esc(r.file_path) + '">&#128196; ' + esc(r.file_name) + '</span></td>'
          + '<td class="log-time">' + dateStr + ' &middot; ' + timeStr + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

function exportLogsCsv() {
  var table = document.querySelector('.logs-table');
  if (!table) return;
  var rows = Array.from(table.querySelectorAll('tr')).map(function(row) {
    return Array.from(row.querySelectorAll('th, td')).map(function(cell) {
      return '"' + cell.textContent.replace(/"/g, '""').trim() + '"';
    }).join(',');
  });
  var csv  = rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'download-logs-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
  toast('CSV exported', 'ok');
}

</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f5f7;
      --surface:   #ffffff;
      --raised:    #f0f1f5;
      --card-h:    #f7f8fc;
      --border:    #e4e6ee;
      --border-h:  #c9ccdb;
      --text:      #1a1d2e;
      --muted:     #6b7280;
      --dim:       #9ca3af;
      --accent:    #0d6b3a;
      --accent-h:  #0a5730;
      --accent-lt: #f0faf4;
      --accent-md: #a7d9bc;
      --green:     #16a34a;
      --green-lt:  #f0fdf4;
      --danger:    #dc2626;
      --danger-lt: #fef2f2;
      --danger-t:  #b91c1c;
      --success-t: #15803d;
      --radius:    8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:    0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.11);
      --font:      'Plus Jakarta Sans', -apple-system, sans-serif;
    }

    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    button { cursor: pointer; font-family: var(--font); }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-name { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); }
    .logo-sub  { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    #admin-pill {
      display: none; align-items: center; gap: 6px;
      background: var(--accent-lt); border: 1px solid var(--accent-md);
      border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; color: var(--accent);
    }
    #admin-pill.on { display: flex; }
    .admin-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes tin   { from { transform: translateX(12px); opacity: 0; } to { transform: none; opacity: 1; } }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; border: 1px solid transparent; transition: all .15s; white-space: nowrap; }
    .btn-primary   { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover   { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(13,107,58,.25); }
    .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border); box-shadow: var(--shadow-sm); }
    .btn-secondary:hover { background: var(--raised); border-color: var(--border-h); }
    .btn-danger    { background: var(--danger-lt); color: var(--danger-t); border-color: #fecaca; }
    .btn-danger:hover    { background: #fee2e2; border-color: #fca5a5; }
    .btn-ghost     { background: transparent; color: var(--muted); border-color: transparent; }
    .btn-ghost:hover     { background: var(--raised); color: var(--text); }
    .btn-sm  { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ── Hero ── */
    .hero { padding: 28px 32px 0; max-width: 1400px; margin: 0 auto; width: 100%; }
    .hero-inner {
      background: linear-gradient(135deg, #0a5730 0%, #0d6b3a 50%, #138a4a 100%);
      border-radius: var(--radius-lg);
      padding: 32px 40px;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      box-shadow: 0 8px 32px rgba(13,107,58,.2);
      position: relative; overflow: hidden;
    }
    .hero-inner::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .hero-inner::after {
      content: ''; position: absolute; right: 140px; top: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-text { position: relative; z-index: 1; }
    .hero-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 8px; }
    .hero-title { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.15; color: #fff; }
    .hero-title span { color: #a7d9bc; }
    .hero-sub   { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 8px; line-height: 1.6; }

    /* ── Main ── */
    main { flex: 1; padding: 24px 32px 40px; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 16px; font-size: 13px; flex-wrap: wrap;
      padding: 10px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
    }
    .bc-item { color: var(--accent); cursor: pointer; font-weight: 600; }
    .bc-item:hover { text-decoration: underline; }
    .bc-item.cur { color: var(--text); pointer-events: none; font-weight: 500; }
    .bc-sep { color: var(--dim); }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
    .tb-left, .tb-right { display: flex; align-items: center; gap: 8px; }
    .item-count { font-size: 12px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-weight: 500; box-shadow: var(--shadow-sm); }

    /* ── File table ── */
    .ftable { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
    .fhead {
      display: grid; grid-template-columns: minmax(200px,1fr) 100px 160px 130px;
      padding: 11px 20px; background: var(--raised);
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .fhead.adm, .frow.adm { grid-template-columns: minmax(200px,1fr) 100px 160px 200px; }
    .frow {
      display: grid; grid-template-columns: minmax(200px,1fr) 100px 160px 130px;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      align-items: center; transition: background .1s;
    }
    .frow:last-child { border-bottom: none; }
    .frow:hover { background: var(--card-h); }
    .frow.is-dir:hover { border-left: 3px solid var(--accent); padding-left: 17px; }

    .fname { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .ficon-wrap { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .ficon-wrap.dir  { background: var(--accent-lt); border: 1px solid var(--accent-md); }
    .ficon-wrap.file { background: var(--raised); border: 1px solid var(--border); }
    .fntext { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .fntext.dir { color: var(--accent); cursor: pointer; }
    .fntext.dir:hover { text-decoration: underline; }
    .fbadge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; border: 1px solid transparent; }
    .fsize, .fdate { font-size: 12px; color: var(--muted); }
    .factions { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 64px 24px; }
    .empty-icon  { font-size: 44px; opacity: .2; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
    .empty-sub   { font-size: 13px; color: var(--dim); }
    .spinner { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }

    /* ── Login ── */
    #login-wrap { position: fixed; inset: 0; background: rgba(15,23,42,0.45); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
    #login-wrap.on { opacity: 1; pointer-events: all; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 360px; box-shadow: var(--shadow-lg); position: relative; overflow: hidden; }
    .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent-h), #1aab5e); }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .login-logo img { width: 38px; height: 38px; object-fit: contain; }
    .login-card h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .login-card p  { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .fg { margin-bottom: 16px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.07em; }
    .fg input { width: 100%; padding: 10px 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: var(--font); outline: none; transition: border-color .15s, box-shadow .15s; }
    .fg input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,107,58,.12); }
    #login-err { font-size: 12px; color: var(--danger-t); margin-bottom: 12px; display: none; padding: 9px 12px; background: var(--danger-lt); border-radius: 6px; border: 1px solid #fecaca; }

    /* ── Modal ── */
    #modal-wrap { position: fixed; inset: 0; background: rgba(15,23,42,.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity .2s; }
    #modal-wrap.on { opacity: 1; pointer-events: all; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; width: 440px; max-width: 92vw; box-shadow: var(--shadow-lg); }
    .modal-card h3 { font-size: 17px; font-weight: 800; margin-bottom: 18px; letter-spacing: -0.01em; }
    .mfoot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* ── Upload ── */
    .upzone { border: 2px dashed var(--border-h); border-radius: var(--radius); padding: 32px; text-align: center; cursor: pointer; transition: all .2s; color: var(--muted); font-size: 13px; margin-bottom: 10px; background: var(--raised); }
    .upzone:hover, .upzone.over { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); }
    .upzone .upicon { font-size: 30px; margin-bottom: 8px; opacity: .7; }
    .upfile { display: flex; justify-content: space-between; padding: 6px 10px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; margin-top: 5px; font-size: 12px; color: var(--muted); }
    .prog-wrap { height: 4px; background: var(--raised); border-radius: 2px; overflow: hidden; margin-top: 10px; display: none; }
    .prog-wrap.on { display: block; }
    .prog-bar { height: 100%; background: linear-gradient(90deg, var(--accent-h), #1aab5e); width: 0%; transition: width .2s; }

    /* ── Toast ── */
    #toasts { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast { padding: 11px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; box-shadow: var(--shadow); display: flex; align-items: center; gap: 8px; min-width: 240px; animation: tin .2s ease; border: 1px solid transparent; }
    .toast.ok  { background: var(--green-lt); color: var(--success-t); border-color: #bbf7d0; }
    .toast.err { background: var(--danger-lt); color: var(--danger-t); border-color: #fecaca; }
    .toast.inf { background: var(--accent-lt); color: var(--accent);   border-color: var(--accent-md); }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--border); padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--dim); background: var(--surface); }

    @media (max-width: 640px) {
      .hero, main { padding: 14px; }
      .fhead { display: none; }
      .frow, .frow.adm { grid-template-columns: 1fr auto; }
      .fsize, .fdate { display: none; }
      .hero-title { font-size: 24px; }
    }

    /* ── OTP Gate ── */
    .otp-step { display: none; }
    .otp-step.active { display: block; }
    .otp-info { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
    .otp-info strong { color: var(--text); }
    .otp-input-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .otp-input-row input {
      flex: 1; padding: 13px; text-align: center;
      font-size: 22px; font-weight: 700; letter-spacing: 0.15em;
      background: var(--raised); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .otp-input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,107,58,.12); }
    .otp-hint { font-size: 11px; color: var(--dim); margin-bottom: 16px; }
    .otp-resend { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; }
    .otp-resend button { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; font-size: 12px; padding: 0; }
    .otp-resend button:hover { text-decoration: underline; }
    .otp-error { font-size: 12px; color: var(--danger-t); margin-bottom: 10px; display: none; padding: 8px 12px; background: var(--danger-lt); border-radius: 6px; border: 1px solid #fecaca; }
    .otp-file-name { display: inline-flex; align-items: center; gap: 6px; background: var(--raised); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 18px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


    /* ── Download Logs ── */
    .logs-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
    .logs-table th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--border); background: var(--raised); }
    .logs-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .logs-table tr:last-child td { border-bottom: none; }
    .logs-table tr:hover td { background: var(--card-h); }
    .logs-table .log-email { font-weight: 600; color: var(--accent); }
    .logs-table .log-file  { color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logs-table .log-time  { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .logs-wrap { max-height: 420px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    .logs-empty { text-align: center; padding: 36px; color: var(--dim); font-size: 13px; }
    .logs-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .logs-count  { font-size: 12px; color: var(--muted); background: var(--raised); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .modal-wide  { width: 680px !important; }

  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">
      <div>
        <div class="logo-name">Arab Spec IT</div>
        <div class="logo-sub">File Distribution Portal</div>
      </div>
    </div>
    <div class="header-right">
      <div id="admin-pill"><div class="admin-dot"></div> Admin</div>
      <button class="btn btn-secondary btn-sm" id="btn-login" onclick="openLogin()">Admin Login</button>
      <button class="btn btn-secondary btn-sm" id="btn-logout" onclick="doLogout()" style="display:none">Sign Out</button>
    </div>
  </header>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-text">
        <div class="hero-eyebrow">Arab Spec IT</div>
        <div class="hero-title">File <span>Manager</span></div>
        <div class="hero-sub">Browse and download files shared by Arab Spec IT</div>
      </div>
    </div>
  </div>

  <main>
    <div class="breadcrumb" id="bc" style="display:none"></div>

async function browse(prefix) {
  state.path = prefix;
  document.getElementById('fpath').textContent = prefix ? '/' + prefix : '/';
  renderBreadcrumb(prefix);
  const listEl = document.getElementById('flist');
  listEl.innerHTML = '<div class="empty"><div class="spinner"></div><div class="empty-title">Loading...</div></div>';
  const { data, error } = await sb.storage.from(BUCKET).list(prefix || undefined, { limit: 500, offset: 0, sortBy: { column: 'name', order: 'asc' } });
  if (error) {
    listEl.innerHTML = '<div class="empty"><div class="empty-icon">&#9888;&#65039;</div><div class="empty-title">Could not load folder</div><div class="empty-sub">' + esc(error.message) + '</div></div>';
    return;
  }
  const folders = (data || []).filter(i => i.id === null && i.name !== '.keep').sort((a,b) => a.name.localeCompare(b.name));
  const files   = (data || []).filter(i => i.id !== null && i.name !== '.keep').sort((a,b) => a.name.localeCompare(b.name));
  const items   = [...folders, ...files];
  const countEl = document.getElementById('icount');
  if (items.length === 0) {
    listEl.innerHTML = '<div class="empty"><div class="empty-icon">&#128194;</div><div class="empty-title">This folder is empty</div><div class="empty-sub">' + (state.isAdmin ? 'Upload files or create a subfolder to get started.' : 'No files available yet.') + '</div></div>';
    countEl.style.display = 'none'; return;
  }
  var parts = [];
  if (folders.length) parts.push(folders.length + ' folder' + (folders.length > 1 ? 's' : ''));
  if (files.length)   parts.push(files.length + ' file' + (files.length > 1 ? 's' : ''));
  countEl.textContent = parts.join(' · '); countEl.style.display = '';
  listEl.innerHTML = items.map(function(item) {
    var isDir    = item.id === null;
    var itemPath = prefix ? prefix + item.name : item.name;
    var icon     = isDir ? '&#128193;' : fileIcon(item.name);
    var badge    = isDir ? '' : fileBadge(item.name);
    var size     = isDir ? '—' : (item.metadata && item.metadata.size ? fmtSize(item.metadata.size) : '—');
    var modified = item.updated_at ? fmtDate(item.updated_at) : '—';
    var admClass = state.isAdmin ? ' adm' : '';
    var dirClass = isDir ? ' is-dir' : '';
    var actions  = isDir
      ? '<button class="btn btn-secondary btn-sm" onclick="browse(\'' + esc(itemPath) + '/\')">Open &rarr;</button>'
      : '<button class="btn btn-secondary btn-sm" onclick="dlFile(\'' + esc(itemPath) + '\')">&#8659; Download</button>';
    var admActions = state.isAdmin
      ? '<button class="btn btn-danger btn-sm" onclick="confirmDelete(\'' + esc(itemPath) + '\',\'' + esc(item.name) + '\',' + isDir + ')">&#128465;</button>'
      : '';
    return '<div class="frow' + admClass + dirClass + '">'
      + '<div class="fname">'
      + '<div class="ficon-wrap ' + (isDir ? 'dir' : 'file') + '">' + icon + '</div>'
      + '<span class="fntext ' + (isDir ? 'dir' : 'file') + '" onclick="' + (isDir ? 'browse(\'' + esc(itemPath) + '/\')' : '') + '">' + esc(item.name) + '</span>'
      + badge + '</div>'
      + '<div class="fsize">' + size + '</div>'
      + '<div class="fdate">' + modified + '</div>'
      + '<div class="factions">' + actions + admActions + '</div>'
      + '</div>';
  }).join('');
}

function renderBreadcrumb(prefix) {
  var el   = document.getElementById('bc');
  var segs = prefix ? prefix.replace(/\/$/, '').split('/').filter(Boolean) : [];
  if (segs.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  var html = '<span class="bc-item" onclick="browse(\'\')">Home</span>';
  segs.forEach(function(seg, i) {
    var p = segs.slice(0, i + 1).join('/') + '/';
    html += '<span class="bc-sep">/</span><span class="bc-item' + (i === segs.length - 1 ? ' cur' : '') + '" onclick="browse(\'' + esc(p) + '\')">' + esc(seg) + '</span>';
  });
  el.innerHTML = html;
}

// ── OTP download gate ────────────────────────────────────────────────────────
var _pendingDownload = null;
var _userVerified    = false; // verified for this browser session

function requestDownload(path, name) {
  // Admin bypasses OTP gate
  if (state.isAdmin) { doDownload(path); return; }
  // Already verified this session
  if (_userVerified) { doDownload(path); return; }
  _pendingDownload = { path: path, name: name };
  showOtpModal();
}

function showOtpModal() {
  var name = _pendingDownload ? _pendingDownload.name : '';
  showModal(
    '<h3>Verify to Download</h3>'
    + '<div class="otp-file-name">&#128196; ' + esc(name) + '</div>'
    + '<div id="otp-step-email" class="otp-step active">'
    +   '<p class="otp-info">Enter your email address to receive a one-time verification code.</p>'
    +   '<div class="fg"><label>Email Address</label><input id="otp-email" type="email" autocomplete="email" placeholder="you@example.com" /></div>'
    +   '<div id="otp-email-err" class="otp-error"></div>'
    +   '<div class="mfoot">'
    +     '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    +     '<button class="btn btn-primary" id="otp-send-btn" onclick="sendOtp()">Send Code</button>'
    +   '</div>'
    + '</div>'
    + '<div id="otp-step-code" class="otp-step">'
    +   '<p class="otp-info" id="otp-sent-msg">A 6-digit code has been sent to <strong id="otp-sent-email"></strong>. Enter it below.</p>'
    +   '<div class="otp-input-row"><input id="otp-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" /></div>'
    +   '<div class="otp-hint">Code expires in 10 minutes.</div>'
    +   '<div id="otp-code-err" class="otp-error"></div>'
    +   '<div class="mfoot">'
    +     '<button class="btn btn-ghost" onclick="backToEmail()">Back</button>'
    +     '<button class="btn btn-primary" id="otp-verify-btn" onclick="verifyOtp()">Verify &amp; Download</button>'
    +   '</div>'
    +   '<div class="otp-resend">Did not receive it? <button onclick="resendOtp()">Resend code</button></div>'
    + '</div>'
  );
  setTimeout(function() {
    var e = document.getElementById('otp-email');
    if (e) {
      e.focus();
      e.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') sendOtp(); });
    }
  }, 60);
}

async function sendOtp() {
  var emailEl = document.getElementById('otp-email');
  var errEl   = document.getElementById('otp-email-err');
  var btn     = document.getElementById('otp-send-btn');
  if (!emailEl) return;
  var email = emailEl.value.trim();
  errEl.style.display = 'none';
  if (!email || !email.includes('@')) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Sending...';
  var res = await sb.auth.signInWithOtp({ email: email, options: { shouldCreateUser: true } });
  btn.disabled = false; btn.textContent = 'Send Code';
  if (res.error) {
    errEl.textContent = res.error.message;
    errEl.style.display = 'block'; return;
  }
  // Move to code step
  document.getElementById('otp-step-email').classList.remove('active');
  document.getElementById('otp-step-code').classList.add('active');
  document.getElementById('otp-sent-email').textContent = email;
  setTimeout(function() {
    var c = document.getElementById('otp-code');
    if (c) {
      c.focus();
      c.addEventListener('keydown', function(ev) { if (ev.key === 'Enter') verifyOtp(); });
    }
  }, 60);
}

async function verifyOtp() {
  var emailEl = document.getElementById('otp-email');
  var codeEl  = document.getElementById('otp-code');
  var errEl   = document.getElementById('otp-code-err');
  var btn     = document.getElementById('otp-verify-btn');
  if (!emailEl || !codeEl) return;
  var email = emailEl.value.trim();
  var token = codeEl.value.trim();
  errEl.style.display = 'none';
  if (token.length !== 6) {
    errEl.textContent = 'Please enter the 6-digit code.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true; btn.textContent = 'Verifying...';
  var res = await sb.auth.verifyOtp({ email: email, token: token, type: 'email' });
  btn.disabled = false; btn.textContent = 'Verify & Download';
  if (res.error) {
    errEl.textContent = 'Invalid or expired code. Please try again.';
    errEl.style.display = 'block'; return;
  }
  _userVerified = true;
  closeModal();
  toast('Verified! Starting download...', 'ok');
  if (_pendingDownload) { doDownload(_pendingDownload.path); _pendingDownload = null; }
}

async function resendOtp() {
  var emailEl = document.getElementById('otp-email');
  if (!emailEl) return;
  var email = emailEl.value.trim();
  if (!email) return;
  await sb.auth.signInWithOtp({ email: email, options: { shouldCreateUser: true } });
  toast('Code resent to ' + email, 'inf');
}

function backToEmail() {
  document.getElementById('otp-step-code').classList.remove('active');
  document.getElementById('otp-step-email').classList.add('active');
  document.getElementById('otp-code-err').style.display = 'none';
}

async function doDownload(path) {
  toast('Preparing download...', 'inf');
  var res = await sb.storage.from(BUCKET).download(path);
  if (res.error) { toast('Download failed: ' + res.error.message, 'err'); return; }
  var url = URL.createObjectURL(res.data);
  var a = document.createElement('a'); a.href = url; a.download = path.split('/').pop();
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  toast('Download started', 'ok');
  logDownload(path);
}

async function dlFile(path) { requestDownload(path, path.split('/').pop()); }

var upFiles = [];
function openUpload() {
  upFiles = [];
  showModal('<h3>&#8679; Upload Files</h3>'
    + '<div class="upzone" id="upzone" onclick="document.getElementById(\'upinput\').click()" ondragover="event.preventDefault();this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="dropUp(event)">'
    + '<div class="upicon">&#128228;</div>'
    + '<div style="font-weight:600;margin-bottom:4px">Click to browse or drag &amp; drop</div>'
    + '<div style="font-size:11px;color:var(--dim)">Max 50MB per file</div></div>'
    + '<input type="file" id="upinput" multiple style="display:none" onchange="pickUp(this.files)" />'
    + '<div id="uplist"></div>'
    + '<div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>'
    + '<div id="up-status" style="font-size:12px;color:var(--muted);margin-top:6px;text-align:center"></div>'
    + '<div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="up-btn" onclick="submitUpload()" disabled>Upload</button></div>');
}
function dropUp(e) { e.preventDefault(); document.getElementById('upzone').classList.remove('over'); pickUp(e.dataTransfer.files); }
function pickUp(files) {
  upFiles = Array.from(files);
  document.getElementById('uplist').innerHTML = upFiles.map(function(f) { return '<div class="upfile"><span>' + esc(f.name) + '</span><span>' + fmtSize(f.size) + '</span></div>'; }).join('');
  document.getElementById('up-btn').disabled = upFiles.length === 0;
}
async function submitUpload() {
  if (!upFiles.length) return;
  var btn = document.getElementById('up-btn'), status = document.getElementById('up-status');
  var progW = document.getElementById('prog-wrap'), progB = document.getElementById('prog-bar');
  btn.disabled = true; btn.textContent = 'Uploading...'; progW.classList.add('on');
  var done = 0, failed = [];
  for (var i = 0; i < upFiles.length; i++) {
    var file = upFiles[i]; status.textContent = 'Uploading ' + file.name + '...';
    var res = await sb.storage.from(BUCKET).upload(state.path + file.name, file, { upsert: true });
    if (res.error) failed.push(file.name);
    done++; progB.style.width = Math.round((done / upFiles.length) * 100) + '%';
  }
  if (failed.length) toast(failed.length + ' file(s) failed', 'err');
  else toast(done + ' file(s) uploaded successfully', 'ok');
  closeModal(); browse(state.path);
}

function confirmDelete(itemPath, name, isDir) {
  showModal('<h3>Confirm Delete</h3>'
    + '<p style="color:var(--muted);font-size:13px;margin-bottom:14px">Are you sure you want to delete <strong style="color:var(--text)">' + esc(name) + '</strong>' + (isDir ? ' and all its contents' : '') + '? <span style="color:var(--danger-t)">This cannot be undone.</span></p>'
    + '<div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="submitDelete(\'' + esc(itemPath) + '\',\'' + esc(name) + '\',' + isDir + ')">Delete</button></div>');
}
async function submitDelete(itemPath, name, isDir) {
  if (isDir) {
    var res = await sb.storage.from(BUCKET).list(itemPath + '/', { limit: 500 });
    if (res.error) { toast('Could not list folder', 'err'); return; }
    var paths = (res.data || []).map(function(i) { return itemPath + '/' + i.name; });
    if (paths.length) { var r = await sb.storage.from(BUCKET).remove(paths); if (r.error) { toast('Delete failed: ' + r.error.message, 'err'); return; } }
  } else {
    var res = await sb.storage.from(BUCKET).remove([itemPath]);
    if (res.error) { toast('Delete failed: ' + res.error.message, 'err'); return; }
  }
  toast('"' + name + '" deleted', 'ok'); closeModal(); browse(state.path);
}

function showModal(html) { document.getElementById('modal-card').innerHTML = html; document.getElementById('modal-wrap').classList.add('on'); }
function closeModal()    { document.getElementById('modal-wrap').classList.remove('on'); }

function toast(msg, type) {
  if (!type) type = 'inf';
  var icons = { ok: '&#10003;', err: '&#10005;', inf: '&#8505;' };
  var el = document.createElement('div'); el.className = 'toast ' + type;
  el.innerHTML = '<span>' + icons[type] + '</span><span>' + esc(msg) + '</span>';
  document.getElementById('toasts').appendChild(el);
  setTimeout(function() { el.remove(); }, 3500);
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtSize(b) { if (!b && b !== 0) return '—'; var u = ['B','KB','MB','GB'], i = 0; while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; } return b.toFixed(i > 0 ? 1 : 0) + ' ' + u[i]; }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
function ext(n) { return (n.split('.').pop() || '').toLowerCase(); }
function fileIcon(name) {
  var e = ext(name), m = { exe:'&#9881;&#65039;', msi:'&#128230;', zip:'&#128220;&#65039;', rar:'&#128220;&#65039;', '7z':'&#128220;&#65039;', pdf:'&#128196;', doc:'&#128221;', docx:'&#128221;', xls:'&#128202;', xlsx:'&#128202;', ppt:'&#128209;', pptx:'&#128209;', txt:'&#128195;', csv:'&#128202;', jpg:'&#128247;&#65039;', jpeg:'&#128247;&#65039;', png:'&#128247;&#65039;', gif:'&#128247;&#65039;', webp:'&#128247;&#65039;', mp4:'&#127916;', avi:'&#127916;', mkv:'&#127916;', mp3:'&#127925;', iso:'&#128191;', dmg:'&#128191;' };
  return m[e] || '&#128196;';
}
function fileBadge(name) {
  var e = ext(name), m = {
    exe:  '<span class="fbadge" style="background:#f0fdf4;color:#15803d;border-color:#bbf7d0">EXE</span>',
    msi:  '<span class="fbadge" style="background:#f0faf4;color:#0d6b3a;border-color:#a7d9bc">MSI</span>',
    zip:  '<span class="fbadge" style="background:#fffbeb;color:#b45309;border-color:#fde68a">ZIP</span>',
    rar:  '<span class="fbadge" style="background:#fffbeb;color:#b45309;border-color:#fde68a">RAR</span>',
    '7z': '<span class="fbadge" style="background:#fffbeb;color:#b45309;border-color:#fde68a">7Z</span>',
    iso:  '<span class="fbadge" style="background:#faf5ff;color:#7c3aed;border-color:#e9d5ff">ISO</span>',
    pdf:  '<span class="fbadge" style="background:#fef2f2;color:#b91c1c;border-color:#fecaca">PDF</span>',
    doc:  '<span class="fbadge" style="background:#f0faf4;color:#0d6b3a;border-color:#a7d9bc">DOC</span>',
    docx: '<span class="fbadge" style="background:#f0faf4;color:#0d6b3a;border-color:#a7d9bc">DOCX</span>'
  };
  return m[e] || '';
}

// ── Download logging ──────────────────────────────────────────────────────────
async function logDownload(path) {
  var email = '';
  // Get email from current session (set after OTP verification)
  try {
    var sess = await sb.auth.getSession();
    if (sess.data && sess.data.session && sess.data.session.user) {
      email = sess.data.session.user.email || '';
    }
  } catch(e) {}
  if (!email) return; // no session, skip log
  var fileName = path.split('/').pop();
  await sb.from('downloads').insert({
    email:       email,
    file_path:   path,
    file_name:   fileName,
    downloaded_at: new Date().toISOString()
  });
}

// ── Admin: Download logs ──────────────────────────────────────────────────────
async function openLogs() {
  showModal('<div class="logs-header"><h3 style="margin-bottom:0">&#128203; Download Logs</h3><span class="logs-count" id="logs-count">Loading...</span></div>'
    + '<div class="logs-wrap" id="logs-wrap"><div class="logs-empty">&#8987; Loading logs...</div></div>'
    + '<div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Close</button>'
    + '<button class="btn btn-secondary btn-sm" onclick="exportLogsCsv()">&#8659; Export CSV</button></div>');
  document.getElementById('modal-card').classList.add('modal-wide');
  await refreshLogs();
}

async function refreshLogs() {
  var wrap  = document.getElementById('logs-wrap');
  var count = document.getElementById('logs-count');
  if (!wrap) return;
  var res = await sb.from('downloads').select('*').order('downloaded_at', { ascending: false }).limit(500);
  if (res.error) {
    wrap.innerHTML = '<div class="logs-empty">&#9888;&#65039; Could not load logs: ' + esc(res.error.message) + '</div>';
    return;
  }
  var rows = res.data || [];
  count.textContent = rows.length + ' record' + (rows.length !== 1 ? 's' : '');
  if (rows.length === 0) {
    wrap.innerHTML = '<div class="logs-empty">&#128203; No downloads recorded yet.</div>';
    return;
  }
  wrap.innerHTML = '<table class="logs-table">'
    + '<thead><tr><th>#</th><th>Email</th><th>File</th><th>Date &amp; Time</th></tr></thead>'
    + '<tbody>'
    + rows.map(function(r, i) {
        var dt = new Date(r.downloaded_at);
        var dateStr = dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
        var timeStr = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        return '<tr>'
          + '<td style="color:var(--dim);font-size:12px">' + (i + 1) + '</td>'
          + '<td><span class="log-email">' + esc(r.email) + '</span></td>'
          + '<td><span class="log-file" title="' + esc(r.file_path) + '">&#128196; ' + esc(r.file_name) + '</span></td>'
          + '<td class="log-time">' + dateStr + ' &middot; ' + timeStr + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table>';
}

function exportLogsCsv() {
  var table = document.querySelector('.logs-table');
  if (!table) return;
  var rows = Array.from(table.querySelectorAll('tr')).map(function(row) {
    return Array.from(row.querySelectorAll('th, td')).map(function(cell) {
      return '"' + cell.textContent.replace(/"/g, '""').trim() + '"';
    }).join(',');
  });
  var csv  = rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'download-logs-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
  toast('CSV exported', 'ok');
}

</script>
